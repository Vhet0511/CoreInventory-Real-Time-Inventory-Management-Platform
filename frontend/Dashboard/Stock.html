<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="dashboard.css" />
    <title>Dashboard</title>
  </head>
  <body>

    <header>
      <h1>Dashboard</h1>
      <nav>
        <a href="#Dashboard">Dashboard</a>
        <a href="#Operation">Operation</a>
        <a href="#Stock">Stock</a>
        <a href="#MoveHistory">Move History</a>
        <a href="#Settings">Settings</a>
      </nav>
    </header>

    <main class="Dashboard">

      <div class="card stock">
        <h2>Stock</h2>
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Per Unit Cost</th>
              <th>On Hand</th>
              <th>Free to Use</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Desk</td>
              <td>3000 Rs</td>
              <td>50</td>
              <td>45</td>
            </tr>
            <tr>
              <td>Table</td>
              <td>3000 Rs</td>
              <td>50</td>
              <td>50</td>
            </tr>
          </tbody>
        </table>
        <button class="update-btn">Update Stock</button>
      </div>

    </main>
  </body>
</html>
