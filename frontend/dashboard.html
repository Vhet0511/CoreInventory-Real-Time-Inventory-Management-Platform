<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — CoreInventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body{
font-family:'DM Sans',sans-serif;
background:#f0f4ff;
color:#111827;
min-height:100vh;
}

/* HEADER */

header{
background:#1a3a6b;
padding:0 24px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(26,58,107,0.3);
}

nav{display:flex;align-items:center;gap:4px;}

nav a{
color:rgba(255,255,255,0.7);
text-decoration:none;
font-size:13.5px;
font-weight:500;
padding:5px 11px;
border-radius:6px;
transition:all .14s;
}

nav a:hover{
background:rgba(255,255,255,.12);
color:white;
}

nav a.active{
background:rgba(255,255,255,.18);
color:white;
font-weight:700;
}

.nav-dropdown{position:relative;}
.nav-dropdown>a::after{content:' ▾';font-size:10px;}

.dropdown-menu{
display:none;
position:absolute;
top:calc(100% + 6px);
left:0;
background:white;
border:1px solid #dbeafe;
border-radius:8px;
box-shadow:0 6px 20px rgba(26,58,107,0.12);
min-width:150px;
overflow:hidden;
z-index:200;
}

.nav-dropdown:hover .dropdown-menu{display:block;}

.dropdown-menu a{
display:block;
color:#1e3a5f;
padding:9px 14px;
font-size:13px;
font-weight:500;
border-bottom:1px solid #f0f4ff;
}

.dropdown-menu a:last-child{border-bottom:none;}

.dropdown-menu a:hover{
background:#eff6ff;
color:#1a56db;
}

.header-right{
display:flex;
align-items:center;
gap:14px;
}

.header-title{
font-size:21px;
font-weight:700;
color:white;
}

.avatar{
width:32px;
height:32px;
border-radius:6px;
border:1.5px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* MAIN */

main{padding:32px 28px;}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
max-width:820px;
}

/* CARD */

.card{
background:white;
border:1.5px solid #dbeafe;
border-radius:12px;
padding:20px 22px;
box-shadow:0 2px 8px rgba(26,58,107,0.07);
}

.card-title{
font-size:15px;
font-weight:700;
color:#1e3a5f;
margin-bottom:16px;
}

.card-body{
display:flex;
align-items:center;
gap:24px;
}

.cta-btn{
display:inline-flex;
align-items:center;
padding:9px 16px;
border:1.5px solid #d1d5db;
border-radius:8px;
background:white;
font-size:13px;
font-weight:600;
color:#374151;
cursor:pointer;
transition:all .14s;
}

.cta-btn:hover{
border-color:#1a56db;
color:#1a56db;
background:#eff6ff;
}

.card-stats{
display:flex;
flex-direction:column;
gap:6px;
}

.card-stats p{
font-size:13px;
color:#6b7280;
font-weight:500;
}

.stat-number{
color:#111827;
font-weight:700;
font-size:14px;
margin-right:6px;
}

@media(max-width:600px){
.cards{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<nav>

<a href="dashboard.html" class="active">Dashboard</a>

<div class="nav-dropdown">
<a href="operations.html">Operations</a>
<div class="dropdown-menu">
<a href="receipt.html">Receipt</a>
<a href="delivery.html">Delivery</a>
<a href="adjustment.html">Adjustment</a>
</div>
</div>

<a href="stock.html">Stock</a>
<a href="move-history.html">Move History</a>

<div class="nav-dropdown">
<a href="#">Settings</a>
<div class="dropdown-menu">
<a href="warehouse.html">Warehouse</a>
<a href="locations.html">Locations</a>
</div>
</div>

</nav>

<div class="header-right">
<div class="header-title">Dashboard</div>
<div class="avatar">A</div>
</div>

</header>

<main>

<div class="cards">

<div class="card">
<div class="card-title">Receipt</div>

<div class="card-body">

<button class="cta-btn">
<span id="receiptCount" class="stat-number">0</span> to receive
</button>

<div class="card-stats">
<p><span id="receiptOperations" class="stat-number">0</span>operations</p>
</div>

</div>
</div>

<div class="card">

<div class="card-title">Delivery</div>

<div class="card-body">

<button class="cta-btn">
<span id="deliveryCount" class="stat-number">0</span> to Deliver
</button>

<div class="card-stats">
<p><span id="deliveryOperations" class="stat-number">0</span>operations</p>
</div>

</div>
</div>

</div>

</main>

<script>

(function loadDashboardSummary(){

fetch("http://127.0.0.1:8000/api/dashboard/summary/")
.then(function(response){
if(!response.ok) throw new Error("Network response was not ok")
return response.json()
})
.then(function(data){

var r=data && data.receipts ? data.receipts : {}
var d=data && data.deliveries ? data.deliveries : {}

document.getElementById("receiptCount").innerText=r.to_receive ?? 0
document.getElementById("receiptOperations").innerText=r.total_operations ?? 0

document.getElementById("deliveryCount").innerText=d.to_deliver ?? 0
document.getElementById("deliveryOperations").innerText=d.total_operations ?? 0

})
.catch(function(err){
console.error("Dashboard summary fetch error:",err)
})

})();

</script>

</body>
</html>
