<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — CoreInventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Left: nav links */
    nav { display: flex; align-items: center; gap: 4px; }
    nav a {
      color: #6b7280;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      padding: 5px 11px;
      border-radius: 6px;
      transition: all 0.14s;
      white-space: nowrap;
    }
    nav a:hover { background: #f3f4f6; color: #111827; }
    nav a.active { color: #1a56db; font-weight: 600; }

    /* Operations dropdown */
    .nav-dropdown { position: relative; }
    .nav-dropdown > a::after { content: ' ▾'; font-size: 10px; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.10);
      min-width: 150px;
      overflow: hidden;
      z-index: 200;
    }
    .nav-dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a {
      display: block;
      color: #374151;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid #f3f4f6;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover { background: #eff4ff; color: #1a56db; }

    /* Right: title + avatar */
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.3px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1.5px solid #d1d5db;
      background: white;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── MAIN ── */
    main { padding: 28px 24px; }

    /* ── TWO CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 820px;
    }

    .card {
      background: white;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
    }

    .card-body {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      padding: 9px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      transition: all 0.14s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cta-btn:hover { border-color: #1a56db; color: #1a56db; background: #eff4ff; }

    .card-stats { display: flex; flex-direction: column; gap: 4px; }
    .card-stats p { font-size: 13px; color: #6b7280; font-weight: 500; }
    .card-stats p.late    { color: #dc2626; font-weight: 600; }
    .card-stats p.waiting { color: #d97706; font-weight: 600; }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <nav>
  <a href="dashboard.html" class="active">Dashboard</a>

  <div class="nav-dropdown">
    <a href="#">Operations</a>
    <div class="dropdown-menu">
      <a href="receipt.html">Receipt</a>
      <a href="delivery.html">Delivery</a>
      <a href="adjustment.html">Adjustment</a>
    </div>
  </div>

  <a href="stock.html">Stock</a>
  <a href="move-history.html">Move History</a>

  <div class="nav-dropdown">
    <a href="#">Settings</a>
    <div class="dropdown-menu">
      <a href="warehouse.html">Warehouse</a>
      <a href="locations.html">Locations</a>
    </div>
  </div>
</nav>

  <div class="header-right">
    <div class="header-title">Dashboard</div>
    <div class="avatar">A</div>
  </div>
</header>

<main>
  <div class="cards">

    <div class="card">
      <div class="card-title">Receipt</div>
      <div class="card-body">
        <button class="cta-btn">4 to receive</button>
        <div class="card-stats">
          <p class="late">1 Late</p>
          <p>6 operations</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Delivery</div>
      <div class="card-body">
        <button class="cta-btn">4 to Deliver</button>
        <div class="card-stats">
          <p class="late">1 Late</p>
          <p class="waiting">2 waiting</p>
          <p>6 operations</p>
        </div>
      </div>
    </div>

  </div>
</main>

</body>
</html>
