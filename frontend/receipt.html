<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt - CoreInventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f0f4ff;
color:#111827;
}

/* HEADER */

header{
background:#1a3a6b;
padding:0 24px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(26,58,107,0.3);
}

nav{
display:flex;
align-items:center;
gap:4px;
}

nav a{
color:rgba(255,255,255,0.7);
text-decoration:none;
font-size:13.5px;
font-weight:500;
padding:5px 11px;
border-radius:6px;
}

nav a:hover{
background:rgba(255,255,255,.12);
color:white;
}

nav a.active{
background:rgba(255,255,255,.18);
color:white;
font-weight:700;
}

.avatar{
width:32px;
height:32px;
border-radius:6px;
border:1.5px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

/* PAGE */

main{
padding:32px 28px;
}

.page-title{
font-size:21px;
font-weight:700;
color:#1e3a5f;
margin-bottom:20px;
}

/* FORM CARD */

.form-card{
background:white;
border:1.5px solid #dbeafe;
border-radius:12px;
padding:24px;
box-shadow:0 2px 8px rgba(26,58,107,0.07);
max-width:450px;
}

.form-group{
margin-bottom:16px;
}

label{
font-size:13px;
font-weight:600;
color:#374151;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:8px 10px;
border-radius:8px;
border:1px solid #d1d5db;
}

button{
margin-top:10px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#1a56db;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.success-msg{
margin-top:10px;
color:#16a34a;
font-size:13px;
}

.error-msg{
margin-top:10px;
color:#dc2626;
font-size:13px;
}

</style>
</head>

<body>

<header>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="operations.html" class="active">Operations</a>

<a href="stock.html">Stock</a>

<a href="move-history.html">Move History</a>

<a href="#">Settings</a>

</nav>

<div class="avatar">A</div>

</header>


<main>

<div class="page-title">Create Receipt</div>

<div class="form-card">

<div class="form-group">
<label>Customer Name</label>
<input id="customerName" placeholder="Enter customer name">
</div>

<div class="form-group">
<label>Product ID</label>
<input id="productId" type="number" placeholder="Enter product ID">
</div>

<div class="form-group">
<label>Quantity</label>
<input id="quantity" type="number" placeholder="Enter quantity">
</div>

<button onclick="createReceipt()">Create Receipt</button>

<div id="message"></div>

</div>

</main>


<script>

function createReceipt(){

const customer=document.getElementById("customerName").value
const product=document.getElementById("productId").value
const qty=document.getElementById("quantity").value

fetch("http://127.0.0.1:8000/api/receipts/create/",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
customer_name:customer,
product_id:Number(product),
quantity:Number(qty)
})
})
.then(()=>{

document.getElementById("message").innerHTML = `
<div style="margin-top:20px;background:white;border:1.5px solid #dbeafe;border-radius:12px;padding:18px;max-width:450px;box-shadow:0 2px 8px rgba(26,58,107,0.07);">

<div style="font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:12px;">
Receipt Created
</div>

<div style="margin-bottom:10px">
<label style="font-size:12px;color:#6b7280;font-weight:600">Customer Name</label>
<div style="padding:8px 10px;border:1px solid #dbeafe;border-radius:8px;background:#f9fbff;font-size:13px;">
${customer}
</div>
</div>

<div style="margin-bottom:10px">
<label style="font-size:12px;color:#6b7280;font-weight:600">Product ID</label>
<div style="padding:8px 10px;border:1px solid #dbeafe;border-radius:8px;background:#f9fbff;font-size:13px;">
${product}
</div>
</div>

<div style="margin-bottom:10px">
<label style="font-size:12px;color:#6b7280;font-weight:600">Quantity</label>
<div style="padding:8px 10px;border:1px solid #dbeafe;border-radius:8px;background:#f9fbff;font-size:13px;">
${qty}
</div>
</div>

</div>
`

document.getElementById("customerName").value=""
document.getElementById("productId").value=""
document.getElementById("quantity").value=""

})
.catch(()=>{
document.getElementById("message").innerHTML=
"<div class='error-msg'>Error creating receipt</div>"
})

}

</script>
</body>
</html>
