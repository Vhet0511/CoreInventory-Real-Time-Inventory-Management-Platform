<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- New CSS to make ALL text red,
        must include !important for this, other wise text-dark or text-muted will show error--- */
        
        /* Forces standard text color to red */
        body {
            background-color: #f8f9fa;
            color: red;
        }

        /* Overrides Bootstrap's .text-dark class */
        .text-dark {
            color: red !important;
        }

        /* Overrides Bootstrap's .text-muted class */
        .text-muted {
            color: red !important;
        }

        /* Forces all links to be red */
        a {
            color: red !important;
        }
        
        /* Darker red on hover for links */
        a:hover {
            color: #b30000 !important; 
        }

        /* Forces form labels to be red */
        .col-form-label {
            color: red !important;
        }

        /* Sets the color of text typed into the input boxes */
        .custom-input {
            color: red !important;
        }

        /* Sets the color of the placeholder text inside inputs */
        .custom-input::placeholder {
            color: rgba(255, 0, 0, 0.6) !important; /* Semi-transparent red */
        }

        /* -------------------------------------- */

        .login-container {
            max-width: 500px;
            width: 100%;
        }
        .login-card {
            border: 2px solid red; 
            border-radius: 1.5rem;
            background-color: white;
        }
        .logo-placeholder {
            width: 120px;
            height: 60px;
            border: 2px solid red; 
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            /* color applied via CSS above */
            font-size: 0.8rem;
        }
        .custom-input {
            border-radius: 10px;
            border: 2px solid red; 
        }
        .custom-btn {
            border-radius: 10px;
            padding: 8px 30px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Login Page</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">
            
            <div class="mb-5 text-center">
                <div class="logo-placeholder">
                    Logo Here
                </div>
            </div>

            <div class="alert alert-danger py-2 d-none" role="alert" id="errorAlert">
                Invalid Login Id or Password
            </div>

            <form id="loginForm">
                
                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="loginId" class="col-form-label fw-medium">Login Id</label>
                    </div>
                    <div class="col-8">
                        <input type="text" id="loginId" class="form-control custom-input" placeholder="Enter ID" required>
                    </div>
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="password" class="col-form-label fw-medium">Password</label>
                    </div>
                    <div class="col-8">
                        <input type="password" id="password" class="form-control custom-input" placeholder="Enter Password" required>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <button type="submit" class="btn btn-outline-danger custom-btn fw-bold">SIGN IN</button>
                </div>

            </form>

            <div class="text-center mt-2">
                <a href="forgot-password.html" class="text-decoration-none small fw-medium">Forget Password ?</a> 
                <span class="mx-1 text-muted">|</span> 
                <a href="signup.html" class="text-decoration-none small fw-medium">Sign Up</a>
            </div>

        </div>
    </div>

    <script>
        // Simple demo logic for the hackathon presentation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const loginId = document.getElementById('loginId').value;
            const passwordVal = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');

            if(loginId === 'admin' && passwordVal === 'password') {
                errorAlert.classList.replace('d-block', 'd-none');
                alert('Success! Routing to Dashboard...');
            } else {
                errorAlert.classList.replace('d-none', 'd-block');
            }
        });
    </script>
</body>
</html>
