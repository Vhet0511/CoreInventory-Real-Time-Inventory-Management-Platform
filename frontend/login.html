<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Professional Blue Theme (#0d6efd) --- */

        body {
            background-color: #f8f9fa;
            color: #0d6efd;
        }

        /* Overriding Bootstrap defaults to our blue theme */
        .text-dark {
            color: #0d6efd !important;
        }

        .text-muted {
            color: #0d6efd !important;
        }

        a {
            color: #0d6efd !important;
        }

        a:hover {
            color: #0a58ca !important;
        }

        /* Darker blue on hover */
        .col-form-label {
            color: #0d6efd !important;
        }

        .custom-input {
            color: #0d6efd !important;
        }

        .custom-input::placeholder {
            color: rgba(13, 110, 253, 0.5) !important;
        }

        /* -------------------------------------- */

        .login-container {
            max-width: 500px;
            width: 100%;
        }

        .login-card {
            border: 2px solid #0d6efd;
            border-radius: 1.5rem;
            background-color: white;
        }

        .custom-input {
            border-radius: 10px;
            border: 2px solid #0d6efd;
        }

        .custom-btn {
            border-radius: 10px;
            padding: 8px 30px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Login Page</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">

            <div class="mb-5 text-center">
                <img src="static/images/icons8-delivery-box-96.gif" alt="CoreInventory Logo" style="height: 80px;">
                <h4 class="mt-2 fw-bold text-dark">CoreInventory</h4>
            </div>

            <div class="alert alert-danger py-2 d-none" role="alert" id="errorAlert">
                Invalid Login Id or Password
            </div>

            <form id="loginForm">

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="loginId" class="col-form-label fw-medium">Login Id</label>
                    </div>
                    <div class="col-8">
                        <input type="text" id="loginId" class="form-control custom-input" placeholder="Enter ID"
                            required>
                    </div>
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="password" class="col-form-label fw-medium">Password</label>
                    </div>
                    <div class="col-8">
                        <input type="password" id="password" class="form-control custom-input"
                            placeholder="Enter Password" required>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <button type="submit" class="btn btn-outline-primary custom-btn fw-bold">SIGN IN</button>
                </div>

            </form>

            <div class="text-center mt-2">
                <a href="forgot-password.html" class="text-decoration-none small fw-medium">Forgot Password ?</a>
                <span class="mx-1 text-muted">|</span>
                <a href="signup.html" class="text-decoration-none small fw-medium">Sign Up</a>
            </div>

        </div>
    </div>

    <script>
        // Simple demo logic for the hackathon presentation
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const loginId = document.getElementById('loginId').value;
            const passwordVal = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');

            if (loginId === 'admin' && passwordVal === 'password') {
                errorAlert.classList.replace('d-block', 'd-none');
                alert('Success! Routing to Dashboard...');
                // window.location.href = 'dashboard.html';
            } else {
                errorAlert.classList.replace('d-none', 'd-block');
            }
        });
    </script>
</body>

</html>
