<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* --- Professional Blue Theme (#0d6efd) --- */
        body {
            background-color: #f8f9fa;
            color: #0d6efd;
        }

        .text-dark,
        .text-muted,
        a,
        .col-form-label,
        .custom-input {
            color: #0d6efd !important;
        }

        a:hover {
            color: #0a58ca !important;
        }

        .custom-input::placeholder {
            color: rgba(13, 110, 253, 0.5) !important;
        }

        /* --- Box & UI Styling --- */
        .login-container {
            max-width: 550px;
            width: 100%;
        }

        .login-card {
            border: 2px solid #0d6efd;
            border-radius: 1.5rem;
            background-color: white;
        }

        .logo-placeholder {
            width: 120px;
            height: 60px;
            border: 2px solid #0d6efd;
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        /* Added padding so the eye icon doesn't overlap typed text */
        .custom-input {
            border-radius: 10px;
            border: 2px solid #0d6efd;
            padding-right: 2.5rem;
        }

        .custom-btn {
            border-radius: 10px;
            padding: 8px 30px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .custom-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* UX Features */
        .password-toggle {
            cursor: pointer;
            color: #0d6efd;
            z-index: 10;
        }

        .otp-letter-spacing {
            letter-spacing: 0.5rem;
            text-align: center;
            font-size: 1.2rem;
            fw-bold;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Verify OTP</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">

            <div class="mb-4 text-center">
                <img src="../static/images/icons8-delivery-box-96.gif" alt="CoreInventory Logo" style="height: 80px;">
                <h4 class="mt-2 fw-bold text-dark">CoreInventory</h4>
            </div>

            <p class="text-center small mb-4">We sent a 6-digit code to your email. Enter it below to securely reset
                your password.</p>

            <div class="alert alert-danger py-2 d-none small" role="alert" id="errorAlert"></div>

            <form id="verifyOtpForm">

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="otpCode" class="col-form-label fw-medium">Enter OTP</label>
                    </div>
                    <div class="col-8">
                        <input type="text" id="otpCode" class="form-control custom-input otp-letter-spacing"
                            placeholder="------" maxlength="6" required>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="newPassword" class="col-form-label fw-medium">New Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="newPassword" class="form-control custom-input"
                            placeholder="Enter new password" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                            id="toggleNewPassword"></i>
                    </div>
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="confirmPassword" class="col-form-label fw-medium">Confirm Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="confirmPassword" class="form-control custom-input"
                            placeholder="Re-enter new password" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                            id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="text-center mb-3">
                    <button type="submit" class="btn btn-outline-primary custom-btn fw-bold" id="verifyBtn">VERIFY &
                        RESET</button>
                </div>

                <div class="text-center mt-2">
                    <span class="small">Didn't receive the code? <a href="#" id="resendLink"
                            class="text-decoration-none fw-bold">Resend OTP</a> <span id="timerText"
                            class="text-muted d-none">(Wait 30s)</span></span>
                </div>

            </form>
        </div>
    </div>

    <script>
        // --- UX Feature: Toggle Password Visibility ---
        function setupPasswordToggle(toggleId, inputId) {
            const toggleIcon = document.getElementById(toggleId);
            const inputField = document.getElementById(inputId);

            toggleIcon.addEventListener('click', function () {
                const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                inputField.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }

        setupPasswordToggle('toggleNewPassword', 'newPassword');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

        // --- UX Feature: Resend OTP Timer ---
        document.getElementById('resendLink').addEventListener('click', function (e) {
            e.preventDefault();
            const link = this;
            const timerText = document.getElementById('timerText');

            if (link.style.pointerEvents === 'none') return; // Prevent spam clicking

            console.log("Requesting new OTP...");
            alert("A new OTP has been sent to your email.");

            link.style.pointerEvents = 'none';
            link.classList.add('text-muted');
            timerText.classList.remove('d-none');

            let timeLeft = 30;
            const timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = `(Wait ${timeLeft}s)`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    link.style.pointerEvents = 'auto';
                    link.classList.remove('text-muted');
                    timerText.classList.add('d-none');
                    timerText.innerText = '(Wait 30s)';
                }
            }, 1000);
        });

        // --- Form Validation & Loading State ---
        document.getElementById('verifyOtpForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const btn = document.getElementById('verifyBtn');
            const otp = document.getElementById('otpCode').value;
            const pass1 = document.getElementById('newPassword').value;
            const pass2 = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');

            errorAlert.classList.add('d-none');

            // 1. Basic Validation
            if (otp.length !== 6 || isNaN(otp)) {
                showError("Please enter a valid 6-digit OTP.");
                return;
            }
            if (pass1 !== pass2) {
                showError("New passwords do not match.");
                return;
            }

            // 2. Simulated Loading State
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Verifying...';

            setTimeout(() => {
                alert('Success! Your password has been securely reset. Routing to login...');
                window.location.href = 'login.html'; // Redirect to login
            }, 2000);
        });

        function showError(msg) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.innerText = msg;
            errorAlert.classList.replace('d-none', 'd-block');
        }
    </script>
</body>

</html>
