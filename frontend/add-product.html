<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f0f4ff;
color:#111827;
}

header{
background:#1a3a6b;
padding:0 24px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(26,58,107,0.3);
}

nav{
display:flex;
align-items:center;
gap:4px;
}

nav a{
color:rgba(255,255,255,0.7);
text-decoration:none;
font-size:13.5px;
font-weight:500;
padding:5px 11px;
border-radius:6px;
}

nav a:hover{
background:rgba(255,255,255,.12);
color:white;
}

nav a.active{
background:rgba(255,255,255,.18);
color:white;
font-weight:700;
}

.avatar{
width:32px;
height:32px;
border-radius:6px;
border:1.5px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

main{
padding:32px 28px;
}

.page-title{
font-size:21px;
font-weight:700;
color:#1e3a5f;
margin-bottom:20px;
}

.form-card{
background:white;
border:1.5px solid #dbeafe;
border-radius:12px;
padding:24px;
box-shadow:0 2px 8px rgba(26,58,107,0.07);
max-width:450px;
}

.form-group{
margin-bottom:16px;
}

label{
font-size:13px;
font-weight:600;
color:#374151;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:8px 10px;
border-radius:8px;
border:1px solid #d1d5db;
}

button{
margin-top:10px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#1a56db;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.table-box{
margin-top:40px;
background:white;
border-radius:12px;
border:1px solid #dbeafe;
padding:20px;
max-width:750px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
color:#1e3a5f;
font-weight:700;
}

</style>
</head>

<body>

<header>

<nav>

<a href="dashboard.html">Dashboard</a>
<a href="operations.html">Operations</a>
<a href="stock.html" class="active">Stock</a>
<a href="#">Move History</a>
<a href="#">Settings</a>

</nav>

<div class="avatar">A</div>

</header>

<main>

<div class="page-title">Add Product</div>

<div class="form-card">

<div class="form-group">
<label>Product Name</label>
<input id="name">
</div>

<div class="form-group">
<label>SKU</label>
<input id="sku">
</div>

<div class="form-group">
<label>Category ID</label>
<input id="categoryId" type="number">
</div>

<div class="form-group">
<label>Unit ID</label>
<input id="unitId" type="number">
</div>

<div class="form-group">
<label>Reorder Level</label>
<input id="reorderLevel" type="number">
</div>

<button onclick="createProduct()">Add Product</button>

<div id="message"></div>

</div>

<div class="table-box">

<h3 style="margin-bottom:15px;color:#1e3a5f">Product History</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>SKU</th>
<th>Category</th>
<th>Unit</th>
<th>Reorder Level</th>
</tr>
</thead>

<tbody id="productTable"></tbody>

</table>

</div>

</main>

<script>

function loadProducts(){

const products=JSON.parse(localStorage.getItem("products")||"[]")

const table=document.getElementById("productTable")

table.innerHTML=""

products.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.sku}</td>
<td>${p.category}</td>
<td>${p.unit}</td>
<td>${p.reorder}</td>
</tr>
`

})

}

function createProduct(){

const name=document.getElementById("name").value
const sku=document.getElementById("sku").value
const category=document.getElementById("categoryId").value
const unit=document.getElementById("unitId").value
const reorder=document.getElementById("reorderLevel").value

fetch("http://127.0.0.1:8000/api/products/create/",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
sku:sku,
category_id:Number(category),
unit_id:Number(unit),
reorder_level:Number(reorder)
})
})
.then(()=>{

const product={
name:name,
sku:sku,
category:category,
unit:unit,
reorder:reorder
}

let history=JSON.parse(localStorage.getItem("products")||"[]")

history.push(product)

localStorage.setItem("products",JSON.stringify(history))

document.getElementById("message").innerHTML="Product Added"

document.getElementById("name").value=""
document.getElementById("sku").value=""
document.getElementById("categoryId").value=""
document.getElementById("unitId").value=""
document.getElementById("reorderLevel").value=""

loadProducts()

})
.catch(()=>{
document.getElementById("message").innerHTML="Error adding product"
})

}

loadProducts()

</script>

</body>
</html>
