<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Professional Blue Theme (#0d6efd) --- */
        body {
            background-color: #f8f9fa;
            color: #0d6efd;
        }

        .text-dark,
        .text-muted,
        a,
        .col-form-label,
        .custom-input {
            color: #0d6efd !important;
        }

        a:hover {
            color: #0a58ca !important;
        }

        .custom-input::placeholder {
            color: rgba(13, 110, 253, 0.5) !important;
        }

        /* --- Box Styling --- */
        .login-container {
            max-width: 500px;
            width: 100%;
        }

        .login-card {
            border: 2px solid #0d6efd;
            border-radius: 1.5rem;
            background-color: white;
        }

        .custom-input {
            border-radius: 10px;
            border: 2px solid #0d6efd;
        }

        .custom-btn {
            border-radius: 10px;
            padding: 8px 30px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        /* Disabled state styling to look professional */
        .custom-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Forgot Password</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">

            <div class="mb-4 text-center">
                <img src="../static/images/icons8-delivery-box-96.gif" alt="CoreInventory Logo" style="height: 80px;">
                <h4 class="mt-2 fw-bold text-dark">CoreInventory</h4>
            </div>

            <p class="text-center small mb-4">Enter your registered email address to receive a One-Time Password (OTP)
                for account recovery.</p>

            <form id="resetForm">

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="resetEmail" class="col-form-label fw-medium">Enter Email Id</label>
                    </div>
                    <div class="col-8">
                        <input type="email" id="resetEmail" class="form-control custom-input"
                            placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <button type="submit" class="btn btn-outline-primary custom-btn fw-bold" id="resetBtn">SEND
                        OTP</button>
                </div>

            </form>

            <div class="text-center mt-2">
                <a href="login.html" class="text-decoration-none small fw-medium">Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        // --- UX Feature: Simulated Loading State for OTP Request ---
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const btn = document.getElementById('resetBtn');
            const email = document.getElementById('resetEmail').value;

            console.log(`Attempting to send OTP to: ${email}`);

            // 1. Change button to show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Sending OTP...';

            // 2. Simulate network delay (2 seconds)
            setTimeout(() => {
                console.log("Simulated OTP sent successfully.");
                alert('An OTP has been sent to your email address!');

                // Reset button back to normal
                btn.disabled = false;
                btn.innerHTML = 'SEND OTP';
                document.getElementById('resetForm').reset();

                // Redirect user to the "Enter OTP" verification page here
                // window.location.href = 'verify-otp.html';
            }, 2000);
        });
    </script>
</body>

</html>
