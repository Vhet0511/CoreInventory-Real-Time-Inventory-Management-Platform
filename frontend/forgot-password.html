<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- Red Text Theme --- */
        body { background-color: #f8f9fa; color: red; }
        .text-dark, .text-muted, a, .col-form-label, .custom-input { color: red !important; }
        a:hover { color: #b30000 !important; }
        .custom-input::placeholder { color: rgba(255, 0, 0, 0.6) !important; }

        /* --- Box Styling --- */
        .login-container { max-width: 500px; width: 100%; }
        .login-card { border: 2px solid red; border-radius: 1.5rem; background-color: white; }
        .logo-placeholder {
            width: 120px; height: 60px; border: 2px solid red; border-radius: 10px;
            margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        .custom-input { border-radius: 10px; border: 2px solid red; }
        .custom-btn { border-radius: 10px; padding: 8px 30px; letter-spacing: 1px; transition: all 0.3s; }
        
        /* Disabled state styling to look professional */
        .custom-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Forgot Password</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">
            
            <div class="mb-5 text-center">
                <div class="logo-placeholder">Logo Here</div>
            </div>

            <p class="text-center small mb-4">Please Enter your registered email address to receive a password reset link.</p>

            <form id="resetForm">
                
                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="resetEmail" class="col-form-label fw-medium">Enter Email Id</label>
                    </div>
                    <div class="col-8">
                        <input type="email" id="resetEmail" class="form-control custom-input" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="text-center mb-4">
                    <button type="submit" class="btn btn-outline-danger custom-btn fw-bold" id="resetBtn">RESET PASSWORD</button>
                </div>

            </form>

            <div class="text-center mt-2">
                <a href="login.html" class="text-decoration-none small fw-medium">Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        // --- UX Feature: Simulated Loading State, can be removed if not needed ---
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('resetBtn');
            const email = document.getElementById('resetEmail').value;
            
            console.log(`Attempting to send reset link to: ${email}`);
            
            // 1. Change button to show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Sending...';
            
            // 2. Simulate network delay (2 seconds)
            setTimeout(() => {
                console.log("Simulated email sent successfully.");
                alert('If that email is in our system, a reset link has been sent!');
                
                // Reset button back to normal
                btn.disabled = false;
                btn.innerHTML = 'RESET PASSWORD';
                document.getElementById('resetForm').reset();
            }, 2000);
        });
    </script>
</body>
</html>
