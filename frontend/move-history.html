<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move History - CoreInventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f0f4ff;
color:#111827;
}

/* HEADER */

header{
background:#1a3a6b;
padding:0 24px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(26,58,107,0.3);
}

nav{
display:flex;
align-items:center;
gap:4px;
}

nav a{
color:rgba(255,255,255,0.7);
text-decoration:none;
font-size:13.5px;
font-weight:500;
padding:5px 11px;
border-radius:6px;
transition:all .14s;
}

nav a:hover{
background:rgba(255,255,255,.12);
color:white;
}

nav a.active{
background:rgba(255,255,255,.18);
color:white;
font-weight:700;
}

.nav-dropdown{position:relative;}
.nav-dropdown>a::after{content:' ▾';font-size:10px;}

.dropdown-menu{
display:none;
position:absolute;
top:calc(100% + 6px);
left:0;
background:white;
border:1px solid #dbeafe;
border-radius:8px;
box-shadow:0 6px 20px rgba(26,58,107,0.12);
min-width:155px;
overflow:hidden;
z-index:200;
}

.nav-dropdown:hover .dropdown-menu{display:block;}

.dropdown-menu a{
display:block;
color:#1e3a5f;
padding:9px 14px;
font-size:13px;
font-weight:500;
border-bottom:1px solid #f0f4ff;
}

.dropdown-menu a:last-child{border-bottom:none;}

.dropdown-menu a:hover{
background:#eff6ff;
color:#1a56db;
}

.avatar{
width:32px;
height:32px;
border-radius:6px;
border:1.5px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* PAGE */

.container{
padding:32px 28px;
}

/* TOP BAR */

.top-controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.page-title{
font-size:21px;
font-weight:700;
color:#1e3a5f;
}

.search-input{
padding:8px 12px;
border-radius:8px;
border:1px solid #d1d5db;
}

.btn{
padding:8px 16px;
border-radius:8px;
border:1.5px solid #d1d5db;
background:white;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#1a56db;
color:white;
border-color:#1a56db;
}

/* TABLE */

.table-container{
background:white;
border:1.5px solid #dbeafe;
border-radius:12px;
box-shadow:0 2px 8px rgba(26,58,107,0.07);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#eff6ff;
}

th,td{
padding:10px 12px;
text-align:left;
font-size:13px;
}

th{
color:#1e3a5f;
font-weight:700;
}

tbody tr{
border-bottom:1px solid #f0f4ff;
cursor:pointer;
}

tbody tr:hover{
background:#f9fbff;
}

/* MOVE COLORS */

.move-in{color:#16a34a;font-weight:600;}
.move-out{color:#dc2626;font-weight:600;}

.badge-ready{
background:#0dcaf0;
color:white;
padding:4px 10px;
border-radius:20px;
}

.badge-done{
background:#16a34a;
color:white;
padding:4px 10px;
border-radius:20px;
}

</style>
</head>

<body>

<header>

<nav>

<a href="dashboard.html">Dashboard</a>

<div class="nav-dropdown">
<a href="operations.html">Operations</a>
<div class="dropdown-menu">
<a href="receipt.html">Receipt</a>
<a href="delivery.html">Delivery</a>
<a href="adjustment.html">Adjustment</a>
</div>
</div>

<a href="stock.html">Stock</a>
<a href="move-history.html" class="active">Move History</a>

<div class="nav-dropdown">
<a href="#">Settings</a>
<div class="dropdown-menu">
<a href="warehouse.html">Warehouse</a>
<a href="locations.html">Locations</a>
</div>
</div>

</nav>

<div class="avatar">A</div>

</header>

<div class="container">

<div class="top-controls">

<div style="display:flex;align-items:center;gap:15px">
<button class="btn btn-primary">NEW</button>
<div class="page-title">Move History</div>
</div>

<input id="searchInput" class="search-input" placeholder="Search Reference or Contact...">

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Reference</th>
<th>Date</th>
<th>Contact</th>
<th>From</th>
<th>To</th>
<th>Quantity</th>
<th>Status</th>
</tr>
</thead>

<tbody id="listBody"></tbody>

</table>

</div>

</div>

<script>

/* SAME JS LOGIC AS BEFORE */

const moveData = [
{ reference:'WH/IN/0001',date:'12/1/2025',contact:'Azure Interior',from:'Vendor',to:'WH/Stock1',qty:50,status:'Ready',type:'IN'},
{ reference:'WH/OUT/0002',date:'11/2/2025',contact:'Azure Interior',from:'WH/Stock1',to:'Customer',qty:10,status:'Ready',type:'OUT'},
{ reference:'WH/IN/0003',date:'12/3/2025',contact:'Dermo Inc',from:'Vendor',to:'WH/Stock2',qty:100,status:'Done',type:'IN'}
];

function getMoveColorClass(type){
return type==='IN'?'move-in':'move-out'
}

function getStatusBadge(status){
return status==='Ready'
?'<span class="badge-ready">Ready</span>'
:'<span class="badge-done">Done</span>'
}

function renderListView(data){

const tbody=document.getElementById('listBody')
tbody.innerHTML=''

data.forEach(move=>{

const colorClass=getMoveColorClass(move.type)

const row=`
<tr>
<td class="${colorClass}">${move.reference}</td>
<td>${move.date}</td>
<td>${move.contact}</td>
<td>${move.from}</td>
<td>${move.to}</td>
<td>${move.qty}</td>
<td>${getStatusBadge(move.status)}</td>
</tr>
`

tbody.insertAdjacentHTML('beforeend',row)

})

}

renderListView(moveData)

</script>

</body>
</html>
