<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Page - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* --- Professional Blue Theme (#0d6efd) --- */
        body {
            background-color: #f8f9fa;
            color: #0d6efd;
        }

        .text-dark,
        .text-muted,
        a,
        .col-form-label,
        .custom-input {
            color: #0d6efd !important;
        }

        a:hover {
            color: #0a58ca !important;
        }

        .custom-input::placeholder {
            color: rgba(13, 110, 253, 0.5) !important;
        }

        /* --- Box & UI Styling --- */
        .login-container {
            max-width: 550px;
            width: 100%;
        }

        .login-card {
            border: 2px solid #0d6efd;
            border-radius: 1.5rem;
            background-color: white;
        }

        /* Padding right (pe-5) prevents text from hiding behind the eye icon */
        .custom-input {
            border-radius: 10px;
            border: 2px solid #0d6efd;
            padding-right: 2.5rem;
        }

        .custom-btn {
            border-radius: 10px;
            padding: 8px 30px;
            letter-spacing: 1px;
        }

        /* UX Feature: Pointer for toggles */
        .password-toggle {
            cursor: pointer;
            color: #0d6efd;
            z-index: 10;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Sign up Page</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">

            <div class="mb-4 text-center">
                <img src="../static/images/icons8-delivery-box-96.gif" alt="CoreInventory Logo" style="height: 80px;">
                <h4 class="mt-2 fw-bold text-dark">CoreInventory</h4>
            </div>

            <div class="alert alert-danger py-2 d-none small" role="alert" id="errorAlert"></div>

            <form id="signupForm">

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="loginId" class="col-form-label fw-medium">Enter Login Id</label>
                    </div>
                    <div class="col-8">
                        <input type="text" id="loginId" class="form-control custom-input" placeholder="6-12 characters"
                            minlength="6" maxlength="12" required>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="emailId" class="col-form-label fw-medium">Enter Email Id</label>
                    </div>
                    <div class="col-8">
                        <input type="email" id="emailId" class="form-control custom-input"
                            placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="password" class="col-form-label fw-medium">Enter Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="password" class="form-control custom-input"
                            placeholder=">8 chars, 1Upper, 1Lower, 1Special" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                            id="togglePassword"></i>
                    </div>
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="confirmPassword" class="col-form-label fw-medium">Re-Enter Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="confirmPassword" class="form-control custom-input"
                            placeholder="Confirm Password" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                            id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="text-center mb-3">
                    <button type="submit" class="btn btn-outline-primary custom-btn fw-bold" id="submitBtn">SIGN
                        UP</button>
                </div>

                <div class="text-center mt-2">
                    <span class="small">Already have an account? <a href="login.html"
                            class="text-decoration-none fw-medium">Log In</a></span>
                </div>

            </form>
        </div>
    </div>

    <script>
        // --- UX Feature(Lil Pro): Toggle Password Visibility ---
        function setupPasswordToggle(toggleId, inputId) {
            const toggleIcon = document.getElementById(toggleId);
            const inputField = document.getElementById(inputId);

            toggleIcon.addEventListener('click', function () {
                const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                inputField.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }

        setupPasswordToggle('togglePassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

        // --- Hackathon(Odoo) Form Validation Logic ---
        document.getElementById("signupForm").addEventListener("submit", async function(e){

    e.preventDefault()

    const name=document.getElementById("loginId").value
    const email=document.getElementById("emailId").value
    const password=document.getElementById("password").value
    const confirmPassword=document.getElementById("confirmPassword").value

    if(password!==confirmPassword){
        alert("Passwords do not match")
        return
    }

    try{

        const response=await fetch("http://127.0.0.1:8000/api/register/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                name:name,
                email:email,
                password:password,
                role:"manager"
            })
        })

        const data=await response.json()

        if(response.ok){
            alert("Registration successful")
            window.location.href="login.html"
        }else{
            alert(data.message || "Registration failed")
        }

    }catch(error){
        console.log(error)
        alert("Server error")
    }

})

        function showError(msg) {
            console.warn("Validation Error:", msg);
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.innerText = msg;
            errorAlert.classList.replace('d-none', 'd-block');
        }
    </script>
</body>

</html>
