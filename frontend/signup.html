<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* --- Red Text Theme --- */
        body { background-color: #f8f9fa; color: red; }
        .text-dark, .text-muted, a, .col-form-label, .custom-input { color: red !important; }
        a:hover { color: #b30000 !important; }
        .custom-input::placeholder { color: rgba(255, 0, 0, 0.6) !important; }

        /* --- Box & UI Styling --- */
        .login-container { max-width: 550px; width: 100%; }
        .login-card { border: 2px solid red; border-radius: 1.5rem; background-color: white; }
        .logo-placeholder {
            width: 120px; height: 60px; border: 2px solid red; border-radius: 10px;
            margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        /* Padding right (pe-5) prevents text from hiding behind the eye icon */
        .custom-input { border-radius: 10px; border: 2px solid red; padding-right: 2.5rem; }
        .custom-btn { border-radius: 10px; padding: 8px 30px; letter-spacing: 1px; }
        
        /* UX Feature: Pointer for toggles */
        .password-toggle { cursor: pointer; color: red; z-index: 10; }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">

    <h3 class="mb-3 fw-bold" style="font-family: sans-serif;">Sign up Page</h3>

    <div class="login-container">
        <div class="card login-card shadow-sm p-4 p-md-5">
            
            <div class="mb-4 text-center">
                <div class="logo-placeholder">Logo Here</div>
            </div>

            <div class="alert alert-danger py-2 d-none small" role="alert" id="errorAlert"></div>

            <form id="signupForm">
                
                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="loginId" class="col-form-label fw-medium">Enter Login Id</label>
                    </div>
                    <div class="col-8">
                        <input type="text" id="loginId" class="form-control custom-input" placeholder="6-12 characters" minlength="6" maxlength="12" required>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="emailId" class="col-form-label fw-medium">Enter Email Id</label>
                    </div>
                    <div class="col-8">
                        <input type="email" id="emailId" class="form-control custom-input" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="row align-items-center mb-4">
                    <div class="col-4 text-start">
                        <label for="password" class="col-form-label fw-medium">Enter Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="password" class="form-control custom-input" placeholder=">8 chars, 1Upper, 1Lower, 1Special" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="row align-items-center mb-5">
                    <div class="col-4 text-start">
                        <label for="confirmPassword" class="col-form-label fw-medium">Re-Enter Password</label>
                    </div>
                    <div class="col-8 position-relative">
                        <input type="password" id="confirmPassword" class="form-control custom-input" placeholder="Confirm Password" required>
                        <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 password-toggle" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="text-center mb-3">
                    <button type="submit" class="btn btn-outline-danger custom-btn fw-bold" id="submitBtn">SIGN UP</button>
                </div>
                
                <div class="text-center mt-2">
                    <span class="small">Already have an account? <a href="login.html" class="text-decoration-none fw-medium">Log In</a></span>
                </div>

            </form>
        </div>
    </div>

    <script>
        // --- UX Feature(Lil Pro): Toggle Password Visibility ccan be removed if not needed ---
        function setupPasswordToggle(toggleId, inputId) {
            const toggleIcon = document.getElementById(toggleId);
            const inputField = document.getElementById(inputId);
            
            toggleIcon.addEventListener('click', function () {
                const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                inputField.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }

        setupPasswordToggle('togglePassword', 'password');
        setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

        // --- Hackathon(Odoo) Form Validation Logic ---
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            console.log("Validating signup credentials...");
            
            const loginId = document.getElementById('loginId').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');

            // Complex password regex check as per pass requirements
            const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9])/;

            errorAlert.classList.add('d-none');

            if (loginId.length < 6 || loginId.length > 12) {
                showError("Login ID must be between 6 and 12 characters.");
                return;
            }
            if (password.length <= 8) {
                showError("Password length must be more than 8 characters.");
                return;
            }
            if (!passwordPattern.test(password)) {
                showError("Password must contain a lowercase letter, an uppercase letter, and a special character.");
                return;
            }
            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }

            console.log("Frontend validation passed. Ready for Django API.");
            alert('Success! Registration complete.');
            // window.location.href = 'login.html';
        });

        function showError(msg) {
            console.warn("Validation Error:", msg);
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.innerText = msg;
            errorAlert.classList.replace('d-none', 'd-block');
        }
    </script>
</body>
</html>
