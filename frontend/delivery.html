<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery — CoreInventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f4ff; color: #111827; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: #1a3a6b; padding: 0 24px; height: 50px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(26,58,107,0.3);
    }
    nav { display: flex; align-items: center; gap: 4px; }
    nav a {
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 13.5px; font-weight: 500;
      padding: 5px 11px; border-radius: 6px; transition: all 0.14s; white-space: nowrap;
    }
    nav a:hover { background: rgba(255,255,255,0.12); color: white; }
    nav a.active { background: rgba(255,255,255,0.18); color: white; font-weight: 700; }
    .nav-dropdown { position: relative; }
    .nav-dropdown > a::after { content: ' ▾'; font-size: 10px; }
    .dropdown-menu {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: white; border: 1px solid #dbeafe; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(26,58,107,0.12); min-width: 155px; overflow: hidden; z-index: 200;
    }
    .nav-dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a {
      display: block; color: #1e3a5f; padding: 9px 14px;
      font-size: 13px; font-weight: 500; border-bottom: 1px solid #f0f4ff; text-decoration: none;
    }
    .dropdown-menu a:last-child { border-bottom: none; }
    .dropdown-menu a:hover { background: #eff6ff; color: #1a56db; }
    .avatar {
      width: 32px; height: 32px; border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15);
      color: white; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* ── PAGE ── */
    main { padding: 24px; }
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .btn-new {
      padding: 7px 16px; border: 1.5px solid #1a3a6b; border-radius: 6px;
      background: white; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700; color: #1a3a6b;
      cursor: pointer; letter-spacing: 0.3px; transition: all 0.14s;
    }
    .btn-new:hover { background: #eff6ff; }
    .page-title { font-size: 22px; font-weight: 700; color: #1e3a5f; letter-spacing: -0.3px; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 7px 12px 7px 32px; border: 1.5px solid #dbeafe;
      border-radius: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: #111827; width: 220px;
      outline: none; transition: border 0.14s; background: white;
    }
    .search-wrap input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .search-wrap input::placeholder { color: #9ca3af; }
    .search-icon {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%); font-size: 13px; color: #9ca3af; pointer-events: none;
    }

    .view-toggle { display: flex; border: 1.5px solid #dbeafe; border-radius: 6px; overflow: hidden; }
    .view-btn {
      padding: 6px 11px; border: none; background: white;
      color: #9ca3af; cursor: pointer; font-size: 14px;
      transition: all 0.14s; display: flex; align-items: center; justify-content: center;
    }
    .view-btn:hover { background: #eff6ff; color: #1a56db; }
    .view-btn.active { background: #1a56db; color: white; }
    .view-btn + .view-btn { border-left: 1.5px solid #dbeafe; }

    /* ── TABLE ── */
    .table-wrap {
      background: white; border: 1px solid #dbeafe;
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(26,58,107,0.06);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #eff6ff; border-bottom: 1.5px solid #dbeafe; }
    thead th {
      padding: 10px 16px; text-align: left;
      font-size: 11px; font-weight: 700; color: #1a56db;
      text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    }
    thead th:first-child { padding-left: 20px; }
    tbody tr { border-bottom: 1px solid #f0f4ff; cursor: pointer; transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f0fdf4; }
    tbody td { padding: 12px 16px; font-size: 13.5px; color: #374151; vertical-align: middle; }
    tbody td:first-child { padding-left: 20px; }

    /* OUT reference = GREEN */
    .ref-out {
      font-family: 'DM Mono', monospace;
      font-size: 12.5px; font-weight: 600;
      color: #16a34a;
    }
    .contact { color: #6b7280; font-size: 13px; }

    .badge {
      display: inline-flex; align-items: center;
      font-size: 11.5px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .badge-ready { background: #eff6ff; color: #1a56db; border: 1px solid #bfdbfe; }
    .badge-done  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    /* ── KANBAN ── */
    .kanban-wrap { display: none; grid-template-columns: 1fr 1fr; gap: 16px; }
    .kanban-wrap.active { display: grid; }
    .kanban-col { background: #e8efff; border-radius: 10px; padding: 14px; min-height: 200px; }
    .kanban-col-title {
      font-size: 11.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #1a56db; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-count {
      background: #bfdbfe; color: #1a3a6b;
      font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 20px;
    }
    .kanban-card {
      background: white; border: 1px solid #dbeafe;
      border-left: 3px solid #16a34a; /* OUT = green left border */
      border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(26,58,107,0.07);
      cursor: pointer; transition: transform 0.14s, box-shadow 0.14s;
    }
    .kanban-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(26,58,107,0.12); }
    .kanban-card:last-child { margin-bottom: 0; }
    .kc-ref { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; color: #16a34a; }
    .kc-contact { font-size: 12.5px; color: #6b7280; margin-top: 3px; }
    .kc-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .kc-route { font-size: 12px; color: #9ca3af; }

    #empty-state { display: none; text-align: center; padding: 48px 20px; color: #9ca3af; }
    #empty-state p { font-size: 14px; font-weight: 500; }

    @media (max-width: 600px) { .kanban-wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <div class="nav-dropdown">
      <a href="operations.html" class="active">Operations</a>
      <div class="dropdown-menu">
        <a href="receipt.html">📥 Receipt</a>
        <a href="delivery.html" style="color:#16a34a;font-weight:700">📤 Delivery</a>
        <a href="adjustment.html">✏️ Adjustment</a>
      </div>
    </div>
    <a href="stock.html">Stock</a>
    <a href="move-history.html">Move History</a>
    <div class="nav-dropdown">
      <a href="#">Settings</a>
      <div class="dropdown-menu">
        <a href="warehouse.html">Warehouse</a>
        <a href="locations.html">Locations</a>
      </div>
    </div>
  </nav>
  <div class="avatar">A</div>
</header>

<main>
  <div class="toolbar">
    <button class="btn-new" onclick="openNewDelivery()">NEW</button>
    <div class="page-title">Delivery</div>
    <div class="toolbar-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search reference or contact…" oninput="filterTable()">
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnList" title="List view" onclick="setView('list')">☰</button>
        <button class="view-btn" id="btnKanban" title="Kanban view" onclick="setView('kanban')">⊞</button>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="table-wrap" id="listView">
    <table>
      <thead>
        <tr>
          <th>Reference</th>
          <th>From</th>
          <th>To</th>
          <th>Contact</th>
          <th>Schedule Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="empty-state"><p>No deliveries found</p></div>
  </div>

  <!-- KANBAN -->
  <div class="kanban-wrap" id="kanbanView">
    <div class="kanban-col">
      <div class="kanban-col-title">Ready <span class="kanban-count" id="readyCount">0</span></div>
      <div id="kanbanReady"></div>
    </div>
    <div class="kanban-col">
      <div class="kanban-col-title">Done <span class="kanban-count" id="doneCount">0</span></div>
      <div id="kanbanDone"></div>
    </div>
  </div>
</main>

<script>
  let deliveries = [
    { id:1, ref:'WH/OUT/0001', from:'WH/Stock1', to:'Customer',  contact:'Azure Interior',      schedDate:'2025-02-12', status:'Ready' },
    { id:2, ref:'WH/OUT/0002', from:'WH/Stock1', to:'Customer',  contact:'Azure Interior',      schedDate:'2025-02-14', status:'Ready' },
    { id:3, ref:'WH/OUT/0003', from:'WH/Stock2', to:'Customer',  contact:'Dermo Inc',           schedDate:'2025-03-05', status:'Done'  },
    { id:4, ref:'WH/OUT/0004', from:'WH/Stock1', to:'Customer',  contact:'FlipnFlop Logistics', schedDate:'2025-03-12', status:'Ready' },
  ];
  let nextId = 5;

  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const badge = s => s==='Ready'
    ? `<span class="badge badge-ready">Ready</span>`
    : `<span class="badge badge-done">Done</span>`;

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('empty-state');
    tbody.innerHTML = '';
    if (!data.length) { empty.style.display=''; return; }
    empty.style.display = 'none';
    data.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="ref-out">${r.ref}</span></td>
        <td>${r.from}</td><td>${r.to}</td>
        <td class="contact">${r.contact}</td>
        <td style="color:#6b7280;font-size:13px">${fmtDate(r.schedDate)}</td>
        <td>${badge(r.status)}</td>`;
      tbody.appendChild(tr);
    });
  }

  function renderKanban(data) {
    const re = document.getElementById('kanbanReady');
    const de = document.getElementById('kanbanDone');
    re.innerHTML = de.innerHTML = '';
    let rc=0, dc=0;
    data.forEach(r => {
      const card = `<div class="kanban-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="kc-ref">${r.ref}</span>${badge(r.status)}
        </div>
        <div class="kc-contact">${r.contact}</div>
        <div class="kc-row">
          <span class="kc-route">${r.from} → ${r.to}</span>
          <span style="font-size:11.5px;color:#9ca3af">${fmtDate(r.schedDate)}</span>
        </div></div>`;
      if (r.status==='Ready') { re.insertAdjacentHTML('beforeend',card); rc++; }
      else                    { de.insertAdjacentHTML('beforeend',card); dc++; }
    });
    document.getElementById('readyCount').textContent = rc;
    document.getElementById('doneCount').textContent  = dc;
    if (!rc) re.innerHTML = '<p style="color:#9ca3af;font-size:13px;text-align:center;padding:20px">No ready deliveries</p>';
    if (!dc) de.innerHTML = '<p style="color:#9ca3af;font-size:13px;text-align:center;padding:20px">No done deliveries</p>';
  }

  const getFiltered = () => {
    const t = document.getElementById('searchInput').value.toLowerCase();
    return deliveries.filter(r => r.ref.toLowerCase().includes(t) || r.contact.toLowerCase().includes(t));
  };
  function filterTable() { const d=getFiltered(); renderTable(d); renderKanban(d); }

  function setView(v) {
    document.getElementById('listView').style.display = v==='list' ? '' : 'none';
    document.getElementById('kanbanView').classList.toggle('active', v==='kanban');
    document.getElementById('btnList').classList.toggle('active', v==='list');
    document.getElementById('btnKanban').classList.toggle('active', v==='kanban');
  }

  function openNewDelivery() {
    const contact = prompt('Contact name:'); if (!contact) return;
    const from    = prompt('From location:','WH/Stock1');
    const to      = prompt('To location:','Customer');
    const sched   = prompt('Schedule date (YYYY-MM-DD):',new Date().toISOString().split('T')[0]);
    const ref     = `WH/OUT/${String(nextId).padStart(4,'0')}`;
    deliveries.unshift({id:nextId++,ref,from:from||'WH/Stock1',to:to||'Customer',contact,schedDate:sched,status:'Ready'});
    filterTable();
  }

  renderTable(deliveries); renderKanban(deliveries);
</script>
</body>
</html>
