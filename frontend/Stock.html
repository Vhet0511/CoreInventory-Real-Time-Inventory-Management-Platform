<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f0f4ff;
color:#111827;
min-height:100vh;
}

/* HEADER */

header{
background:#1a3a6b;
padding:0 24px;
height:50px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 8px rgba(26,58,107,0.3);
}

nav{
display:flex;
align-items:center;
gap:4px;
}

nav a{
color:rgba(255,255,255,0.7);
text-decoration:none;
font-size:13.5px;
font-weight:500;
padding:5px 11px;
border-radius:6px;
transition:all .14s;
}

nav a:hover{
background:rgba(255,255,255,.12);
color:white;
}

nav a.active{
background:rgba(255,255,255,.18);
color:white;
font-weight:700;
}

.nav-dropdown{position:relative;}

.nav-dropdown>a::after{
content:' ▾';
font-size:10px;
}

.dropdown-menu{
display:none;
position:absolute;
top:calc(100% + 6px);
left:0;
background:white;
border:1px solid #dbeafe;
border-radius:8px;
box-shadow:0 6px 20px rgba(26,58,107,0.12);
min-width:155px;
overflow:hidden;
z-index:200;
}

.nav-dropdown:hover .dropdown-menu{
display:block;
}

.dropdown-menu a{
display:block;
color:#1e3a5f;
padding:9px 14px;
font-size:13px;
font-weight:500;
border-bottom:1px solid #f0f4ff;
text-decoration:none;
}

.dropdown-menu a:last-child{
border-bottom:none;
}

.dropdown-menu a:hover{
background:#eff6ff;
color:#1a56db;
}

.header-right{
display:flex;
align-items:center;
gap:14px;
}

.header-title{
font-size:18px;
font-weight:700;
color:white;
}

.avatar{
width:32px;
height:32px;
border-radius:6px;
border:1.5px solid rgba(255,255,255,0.4);
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* PAGE */

main{
padding:32px 28px;
}

/* CARD */

.card{
background:white;
border:1.5px solid #dbeafe;
border-radius:12px;
padding:20px;
box-shadow:0 2px 8px rgba(26,58,107,0.07);
max-width:900px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

thead{
background:#eff6ff;
}

th,td{
text-align:left;
padding:10px 12px;
font-size:13px;
}

th{
color:#1e3a5f;
font-weight:700;
}

tbody tr{
border-bottom:1px solid #f0f4ff;
}

tbody tr:hover{
background:#f9fbff;
}

/* BUTTON */

.update-btn{
margin-top:16px;
padding:8px 16px;
border-radius:8px;
border:1.5px solid #d1d5db;
background:white;
cursor:pointer;
font-size:13px;
font-weight:600;
transition:all .15s;
}

.update-btn:hover{
border-color:#1a56db;
color:#1a56db;
background:#eff6ff;
}

</style>
</head>

<body>

<header>

<nav>

<a href="dashboard.html" class="active">Dashboard</a>

<div class="nav-dropdown">
<a href="operations.html">Operations</a>
<div class="dropdown-menu">
<a href="receipt.html">Receipt</a>
<a href="delivery.html">Delivery</a>
<a href="adjustment.html">Adjustment</a>
</div>
</div>

<a href="stock.html">Stock</a>
<a href="move-history.html">Move History</a>

<div class="nav-dropdown">
<a href="#">Settings</a>
<div class="dropdown-menu">
<a href="warehouse.html">Warehouse</a>
<a href="locations.html">Locations</a>
</div>
</div>

</nav>

<div class="header-right">
<div class="header-title">Dashboard</div>
<div class="avatar">A</div>
</div>

</header>

<main class="Dashboard">

<div class="card stock">

<h2 style="margin-bottom:10px;color:#1e3a5f">Stock</h2>

<table>

<thead>
<tr>
<th>Product</th>
<th>Per Unit Cost</th>
<th>On Hand</th>
<th>Free to Use</th>
</tr>
</thead>

<tbody>

<tr>
<td>Desk</td>
<td>3000 Rs</td>
<td>50</td>
<td>45</td>
</tr>

<tr>
<td>Table</td>
<td>3000 Rs</td>
<td>50</td>
<td>50</td>
</tr>

</tbody>

</table>

<button class="update-btn">Update Stock</button>

</div>

</main>

</body>
</html>
